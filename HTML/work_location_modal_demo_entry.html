  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    (function () {
      function safeParse(json) {
        try { return JSON.parse(json); } catch { return null; }
      }

      function renderToPre(outEl, storageKey) {
        if (!outEl) return;

        var raw = null;
        try { raw = localStorage.getItem(storageKey); } catch { raw = null; }
        if (!raw) {
          outEl.textContent = '未選択';
          return;
        }

        var data = safeParse(raw);
        if (!data || typeof data !== 'object') {
          outEl.textContent = '未選択';
          return;
        }

        if (Array.isArray(data.lines) && data.lines.length) {
          outEl.textContent = data.lines.join('\n');
          return;
        }
        if (typeof data.summary === 'string' && data.summary.trim()) {
          outEl.textContent = data.summary;
          return;
        }

        outEl.textContent = '未選択';
      }

      function renderPref(outEl) {
        if (!outEl) return;

        var goodRaw = null;
        var badRaw = null;
        try { goodRaw = localStorage.getItem('job:pref_selection'); } catch { goodRaw = null; }
        try { badRaw = localStorage.getItem('job:pref_bad_selection'); } catch { badRaw = null; }

        if (!goodRaw && !badRaw) {
          outEl.textContent = '未選択';
          return;
        }

        var lines = [];
        if (goodRaw) {
          var good = safeParse(goodRaw);
          var goodText = (good && Array.isArray(good.lines) && good.lines.length) ? good.lines.join('\n')
            : (good && typeof good.summary === 'string' ? good.summary : '');
          if (goodText && goodText.trim()) {
            lines.push('【良】');
            lines.push(goodText);
          }
        }
        if (badRaw) {
          var bad = safeParse(badRaw);
          var badText = (bad && Array.isArray(bad.lines) && bad.lines.length) ? bad.lines.join('\n')
            : (bad && typeof bad.summary === 'string' ? bad.summary : '');
          if (badText && badText.trim()) {
            if (lines.length) lines.push('');
            lines.push('【悪】');
            lines.push(badText);
          }
        }

        outEl.textContent = lines.length ? lines.join('\n') : '未選択';
      }

      renderToPre(document.getElementById('selectionOutput'), 'job:work_location_selection');
      renderToPre(document.getElementById('stationSelectionOutput'), 'job:station_selection');
      renderToPre(document.getElementById('jobSelectionOutput'), 'job:job_selection');
      renderPref(document.getElementById('prefSelectionOutput'));
      renderToPre(document.getElementById('employmentSelectionOutput'), 'job:employment_selection');
      renderToPre(document.getElementById('salarySelectionOutput'), 'job:salary_selection');
      renderToPre(document.getElementById('skillSelectionOutput'), 'job:skill_selection');
    })();

    (function () {
      function getSaved(key) {
        try { return localStorage.getItem(key); } catch { return null; }
      }
      function setFavorite(payload) {
        try { localStorage.setItem('job:filter_favorite', JSON.stringify(payload)); return true; } catch { return false; }
      }
      function clearSaved() {
        try {
          localStorage.removeItem('job:work_location_selection');
          localStorage.removeItem('job:station_selection');
          localStorage.removeItem('job:job_selection');
          localStorage.removeItem('job:pref_selection');
          localStorage.removeItem('job:pref_bad_selection');
          localStorage.removeItem('job:employment_selection');
          localStorage.removeItem('job:salary_selection');
          localStorage.removeItem('job:skill_selection');
          return true;
        } catch {
          return false;
        }
      }

      var searchBtn = document.getElementById('doSearchBtn');
      var favoriteBtn = document.getElementById('favoriteBtn');
      var clearBtn = document.getElementById('clearSelectionBtn');
      var out = document.getElementById('selectionOutput');
      var outStation = document.getElementById('stationSelectionOutput');
      var outJob = document.getElementById('jobSelectionOutput');
      var outPref = document.getElementById('prefSelectionOutput');
      var outEmployment = document.getElementById('employmentSelectionOutput');
      var outSalary = document.getElementById('salarySelectionOutput');
      var outSkill = document.getElementById('skillSelectionOutput');

      if (searchBtn) {
        searchBtn.addEventListener('click', function () {
          var rawWork = getSaved('job:work_location_selection');
          var rawStation = getSaved('job:station_selection');
          var rawJob = getSaved('job:job_selection');
          var rawPref = getSaved('job:pref_selection');
          var rawBadPref = getSaved('job:pref_bad_selection');
          var rawEmployment = getSaved('job:employment_selection');
          var rawSalary = getSaved('job:salary_selection');
          var rawSkill = getSaved('job:skill_selection');

          if (!rawWork && !rawStation && !rawJob && !rawPref && !rawBadPref && !rawEmployment && !rawSalary && !rawSkill) {
            alert('未選択です（デモ）');
            return;
          }

          var lines = [];
          lines.push('検索（デモ）');
          lines.push('');
          lines.push('【勤務地】');
          lines.push(out ? out.textContent : '未選択');
          lines.push('');
          lines.push('【最寄り駅】');
          lines.push(outStation ? outStation.textContent : '未選択');
          lines.push('');
          lines.push('【職種】');
          lines.push(outJob ? outJob.textContent : '未選択');
          lines.push('');
          lines.push('【こだわり条件】');
          lines.push(outPref ? outPref.textContent : '未選択');
          lines.push('');
          lines.push('【雇用形態】');
          lines.push(outEmployment ? outEmployment.textContent : '未選択');
          lines.push('');
          lines.push('【年収】');
          lines.push(outSalary ? outSalary.textContent : '未選択');
          lines.push('');
          lines.push('【スキル】');
          lines.push(outSkill ? outSkill.textContent : '未選択');
          alert(lines.join('\n'));
        });
      }

      if (favoriteBtn) {
        favoriteBtn.addEventListener('click', function () {
          var rawWork = getSaved('job:work_location_selection');
          var rawStation = getSaved('job:station_selection');
          var rawJob = getSaved('job:job_selection');
          var rawPref = getSaved('job:pref_selection');
          var rawBadPref = getSaved('job:pref_bad_selection');
          var rawEmployment = getSaved('job:employment_selection');
          var rawSalary = getSaved('job:salary_selection');
          var rawSkill = getSaved('job:skill_selection');
          if (!rawWork && !rawStation && !rawJob && !rawPref && !rawBadPref && !rawEmployment && !rawSalary && !rawSkill) {
            alert('未選択のため保存できません（デモ）');
            return;
          }

          var payload = {
            savedAt: new Date().toISOString(),
            work: rawWork ? rawWork : null,
            station: rawStation ? rawStation : null,
            job: rawJob ? rawJob : null,
            pref: rawPref ? rawPref : null,
            prefBad: rawBadPref ? rawBadPref : null,
            employment: rawEmployment ? rawEmployment : null,
            salary: rawSalary ? rawSalary : null,
            skill: rawSkill ? rawSkill : null,
          };

          if (setFavorite(payload)) alert('お気に入りに保存しました（デモ）');
          else alert('保存に失敗しました（Storage が使えない可能性）');
        });
      }

      if (clearBtn) {
        clearBtn.addEventListener('click', function () {
          if (clearSaved()) {
            if (out) out.textContent = '未選択';
            if (outStation) outStation.textContent = '未選択';
            if (outJob) outJob.textContent = '未選択';
            if (outPref) outPref.textContent = '未選択';
            if (outEmployment) outEmployment.textContent = '未選択';
            if (outSalary) outSalary.textContent = '未選択';
            if (outSkill) outSkill.textContent = '未選択';
            alert('クリアしました（デモ）');
          } else {
            alert('クリアに失敗しました（Storage が使えない可能性）');
          }
        });
      }
    })();
  </script>
