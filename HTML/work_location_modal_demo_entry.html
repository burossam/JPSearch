<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>JPSearch デモ入口</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <style>
    td.result {
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h1 class="h3 mb-0">JPSearch デモ入口</h1>
      <a class="btn btn-outline-primary" href="./work_location_modal_demo_all_regions_aomori_grouped.html?tab=work">検索条件を設定する</a>
    </div>

    <div class="card">
      <div class="card-body">
        <table class="table table-bordered align-middle mb-3" aria-label="設定内容">
    <thead>
      <tr>
        <th scope="col" class="table-secondary">№</th>
        <th scope="col" class="table-secondary">設定項目</th>
        <th scope="col" class="table-secondary">設定結果</th>
      </tr>
    </thead>
    <tbody id="settingsTbody"></tbody>
        </table>

        <div id="entryActions" class="d-flex gap-2 justify-content-end">
          <button id="doSearchBtn" class="btn btn-primary" type="button">検索</button>
          <button id="clearSettingsBtn" class="btn btn-outline-secondary" type="button">設定クリア</button>
          <button id="saveFavoriteBtn" class="btn btn-outline-success" type="button">お気に入り登録</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SETTINGS = [
      { label: "勤務地", storageKey: "job:work_location_selection" },
      { label: "最寄り駅", storageKey: "job:station_selection" },
      { label: "職種", storageKey: "job:job_selection" },
      { label: "こだわり条件", storageKey: "job:pref_selection" },
      { label: "雇用形態", storageKey: "job:employment_selection" },
      { label: "手取給料", storageKey: "job:salary_selection" },
      { label: "スキル", storageKey: "job:skill_selection" },
    ];

    const SEARCH_URL = "./work_location_modal_demo_all_regions_aomori_grouped.html?tab=work";

    function safeParseJson(text) {
      try {
        if (!text) return null;
        return JSON.parse(text);
      } catch {
        return null;
      }
    }

    function normalizeLines(payload) {
      if (!payload || typeof payload !== "object") return [];
      const lines = Array.isArray(payload.lines) ? payload.lines : [];
      return lines.map((x) => (x ?? "").toString()).map((x) => x.trim()).filter(Boolean);
    }

    function loadLines(storageKey) {
      try {
        const payload = safeParseJson(localStorage.getItem(storageKey));
        return normalizeLines(payload);
      } catch {
        return [];
      }
    }

    function renderSettingsTable() {
      const tbody = document.getElementById("settingsTbody");
      if (!tbody) return;
      tbody.innerHTML = "";

      SETTINGS.forEach((s, idx) => {
        const lines = loadLines(s.storageKey);
        const resultText = (lines.length > 0) ? lines.join("\n") : "未選択";

        const tr = document.createElement("tr");

        const tdNo = document.createElement("td");
        tdNo.textContent = String(idx + 1);

        const tdLabel = document.createElement("td");
        tdLabel.textContent = s.label;

        const tdResult = document.createElement("td");
        tdResult.className = "result";
        tdResult.textContent = resultText;

        tr.appendChild(tdNo);
        tr.appendChild(tdLabel);
        tr.appendChild(tdResult);
        tbody.appendChild(tr);
      });
    }

    function clearAllSettings() {
      SETTINGS.forEach((s) => {
        try { localStorage.removeItem(s.storageKey); } catch { /* noop */ }
      });
      renderSettingsTable();
    }

    function collectSettingsSnapshot() {
      const snapshot = {
        savedAt: new Date().toISOString(),
        items: SETTINGS.map((s) => ({
          label: s.label,
          storageKey: s.storageKey,
          lines: loadLines(s.storageKey),
        })),
      };
      return snapshot;
    }

    function saveFavorite() {
      const snapshot = collectSettingsSnapshot();
      try {
        localStorage.setItem("job:favorite:last", JSON.stringify(snapshot));
      } catch {
        // Storage が使えない場合は無視
      }
    }

    renderSettingsTable();
    window.addEventListener("storage", renderSettingsTable);
    window.addEventListener("pageshow", renderSettingsTable);

    const doSearchBtn = document.getElementById("doSearchBtn");
    const clearSettingsBtn = document.getElementById("clearSettingsBtn");
    const saveFavoriteBtn = document.getElementById("saveFavoriteBtn");

    if (doSearchBtn) doSearchBtn.addEventListener("click", () => { window.location.href = SEARCH_URL; });
    if (clearSettingsBtn) clearSettingsBtn.addEventListener("click", clearAllSettings);
    if (saveFavoriteBtn) saveFavoriteBtn.addEventListener("click", saveFavorite);
  </script>
</body>
</html>
