<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>勤務地モーダルデモ（全都道府県 / 青森 grouped）</title>
  <link rel="stylesheet" href="../CSS/work_location_modal_demo_all_regions_aomori_grouped.css?v=20260322_1" />
    <script src="../JS/work_location_modal_demo_all_regions_aomori_grouped.data.js?v=20260322_1" defer></script>
    <script src="../JS/work_location_modal_demo_all_regions_aomori_grouped.js?v=20260322_1" defer></script>
</head>
<body>
  <div class="modalBackdrop" aria-label="検索条件モーダル">
    <div class="modal">
      <div class="header">
        <div class="tabs" role="tablist" aria-label="条件タブ">
          <button class="tab active" type="button" data-tab="work">勤務地</button>
          <button class="tab" type="button" data-tab="job">職種</button>
          <button class="tab" type="button" data-tab="station">最寄り駅</button>
          <button class="tab" type="button" data-tab="pref">こだわり条件</button>
          <button class="tab" type="button" data-tab="employment">雇用形態</button>
          <button class="tab" type="button" data-tab="salary">手取り給料</button>
          <button class="tab" type="button" data-tab="skill">スキル</button>
        </div>
        <button id="closeBtn" class="close" type="button" aria-label="閉じる">×</button>
      </div>

      <div class="content">
        <aside class="left" aria-label="左サイド">
          <div class="titleRow">
            <div id="leftTitle">都道府県選択</div>
            <div id="leftHelp" class="pill">チェックで選択</div>
          </div>
          <div id="regionContainer"></div>
        </aside>

        <main class="right" aria-label="右サイド">
          <div class="rightHead">
            <div class="rightTitle">
              <div id="prefTitle">未選択</div>
              <div id="cityCount" class="muted"></div>
            </div>
            <div class="tools">
              <input id="citySearch" class="search" type="search" placeholder="市区町村を検索" />
              <label class="onlyWrap"><input id="onlySelected" type="checkbox" /> 選択済みのみ</label>
              <button id="badPrefBtn" class="btn ghost" type="button">悪（除外）</button>
            </div>
          </div>

          <div id="stationAreaWrap" class="areaBar" style="display:none;">
            <div class="areaLeft">
              <div class="areaLabel">エリア</div>
              <select id="stationAreaSelect" class="areaSelect" aria-label="駅エリア"></select>
            </div>
          </div>

          <div id="areaBar" class="areaBar" hidden>
            <div class="areaLeft">
              <div id="areaLabel" class="areaLabel">エリア</div>
              <select id="areaSelect" class="areaSelect" aria-label="エリア"></select>
            </div>
            <div id="areaCount" class="areaCount"></div>
          </div>

          <div id="cityList" class="cityGrid" aria-label="一覧"></div>
        </main>
      </div>

      <div class="footer" aria-label="フッター">
        <div>
          <div class="label">選択</div>
          <div id="selectedCount" class="summary">0件</div>
          <div id="selectedSummary" class="summary">未選択</div>
        </div>
        <div class="actions">
          <button id="clearBtn" class="btn ghost" type="button">クリア</button>
          <button id="searchBtn" class="btn primary" type="button">検索する</button>
        </div>
      </div>
    </div>
  </div>

  <div id="badPrefModalBackdrop" class="modalBackdrop" hidden>
    <div class="modal" aria-label="悪（除外）こだわり条件">
      <div class="header">
        <div class="tabs">
          <div id="badPrefTitle">悪（除外）</div>
          <div id="badCount" class="pill"></div>
        </div>
        <button id="badPrefCloseBtn" class="close" type="button" aria-label="閉じる">×</button>
      </div>

      <div class="content">
        <aside class="left">
          <div class="titleRow">
            <div>グループ</div>
          </div>
          <div id="badRegionContainer"></div>
        </aside>

        <main class="right">
          <div class="rightHead">
            <div class="rightTitle">
              <div class="muted">選択</div>
              <div id="badSelectedCount" class="pill">0件</div>
            </div>
            <div class="tools">
              <input id="badSearch" class="search" type="search" placeholder="条件を検索" />
              <label class="onlyWrap"><input id="badOnlySelected" type="checkbox" /> 選択済みのみ</label>
            </div>
          </div>

          <div id="badList" class="cityGrid"></div>

          <div class="footer">
            <div>
              <div class="label">選択内容</div>
              <div id="badSelectedSummary" class="summary">未選択</div>
            </div>
            <div class="actions">
              <button id="badClearBtn" class="btn ghost" type="button">クリア</button>
              <button id="badSaveBtn" class="btn primary" type="button">保存</button>
            </div>
          </div>
        </main>
      </div>
    </div>
  </div>

  <div id="saitamaMapBackdrop" class="modalBackdrop" hidden>
    <div class="modal mapOnly" aria-label="埼玉県マップ">
      <div class="header">
        <div class="tabs">埼玉県：市区町村区分マップ</div>
        <button id="saitamaMapCloseBtn" class="close" type="button" aria-label="閉じる">×</button>
      </div>
      <div class="mapModalBody">
        <iframe
          id="saitamaMapFrame"
          class="mapModalFrame"
          src="../assets/saitama_map.html"
          title="埼玉県：市区町村区分マップ"
        ></iframe>
      </div>
    </div>
  </div>
</body>
</html>
