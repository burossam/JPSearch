<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>埼玉県 地図</title>
  <style>
    body{ font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; margin:0; padding:10px; }
    h1{ margin:0 0 6px; font-size:14px; }
    .hint{ color:#6b7280; font-size:11px; margin:0 0 10px; line-height:1.6; }
    .controls{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin:0 0 10px; }
    .btn{ appearance:none; border:1px solid #e5e7eb; background:#f9fafb; color:#111827; border-radius:999px; padding:6px 10px; font-size:12px; font-weight:700; cursor:pointer; }
    .btn:disabled{ opacity:.6; cursor:not-allowed; }
    .btn.primary{ background:#111827; color:#ffffff; border-color:#111827; }
    .file{ display:none; }
    img{ max-width:100%; height:auto; display:block; border:1px solid #e5e7eb; border-radius:12px; }
    .fallback{ border:1px dashed #e5e7eb; border-radius:12px; padding:16px; }
    .fallbackTitle{ font-weight:900; margin:0 0 6px; font-size:14px; }
    .fallbackBody{ margin:0 0 12px; font-size:12px; color:#374151; line-height:1.7; }
    .schematic{ width:100%; max-width: 860px; height:auto; display:block; }
    .badge{ display:inline-block; padding:2px 8px; border:1px solid #e5e7eb; border-radius:999px; font-size:11px; color:#111827; background:#f9fafb; }
  </style>
</head>
<body>
  <h1>埼玉県 地図</h1>
  <p class="hint">
    画像ファイルを <code>assets/saitama_map.png</code> として配置するとここに表示されます。
  </p>

  <div class="controls">
    <input id="mapFile" class="file" type="file" accept="image/*" />
    <button id="chooseBtn" class="btn primary" type="button">写真を選ぶ</button>
    <button id="clearBtn" class="btn" type="button" disabled>保存画像をクリア</button>
    <span class="badge" id="statusBadge" aria-live="polite">PNGを読み込み中</span>
  </div>

  <img id="mapImg" src="./saitama_map.png" alt="埼玉県地図" />

  <div id="fallback" class="fallback" hidden>
    <p class="fallbackTitle">地図画像が見つかりません</p>
    <p class="fallbackBody">
      <span class="badge">対応方法</span>
      <br />
      このページと同じフォルダ（<code>assets/</code>）に <code>saitama_map.png</code> を置いてください。
      置いた直後は、元の画面に戻ってからもう一度「埼玉県」をクリックすると再読み込みされます。
      <br />
      ひとまず下は、現在のエリア区分（東部/西武/南部/北部/秩父）の概略図です。
    </p>

    <svg class="schematic" viewBox="0 0 900 520" role="img" aria-label="埼玉県エリア区分 概略図">
      <rect x="0" y="0" width="900" height="520" rx="16" fill="#ffffff" />
      <rect x="24" y="24" width="852" height="472" rx="14" fill="#f9fafb" stroke="#e5e7eb" />

      <text x="48" y="66" font-size="14" font-weight="900" fill="#111827">埼玉県エリア区分（概略図）</text>
      <text x="48" y="88" font-size="12" fill="#6b7280">※形状は説明用のイメージです</text>

      <g>
        <rect x="70" y="120" width="360" height="150" rx="14" fill="#eef2ff" stroke="#c7d2fe" />
        <text x="92" y="162" font-size="18" font-weight="900" fill="#1d4ed8">西武</text>
      </g>

      <g>
        <rect x="470" y="120" width="360" height="150" rx="14" fill="#ecfeff" stroke="#bae6fd" />
        <text x="492" y="162" font-size="18" font-weight="900" fill="#0369a1">東部</text>
      </g>

      <g>
        <rect x="70" y="300" width="360" height="150" rx="14" fill="#fef9c3" stroke="#fde68a" />
        <text x="92" y="342" font-size="18" font-weight="900" fill="#92400e">秩父</text>
      </g>

      <g>
        <rect x="470" y="300" width="170" height="150" rx="14" fill="#dcfce7" stroke="#bbf7d0" />
        <text x="492" y="342" font-size="18" font-weight="900" fill="#166534">北部</text>
      </g>

      <g>
        <rect x="660" y="300" width="170" height="150" rx="14" fill="#ffe4e6" stroke="#fecdd3" />
        <text x="682" y="342" font-size="18" font-weight="900" fill="#9f1239">南部</text>
      </g>
    </svg>
  </div>

  <script>
    (() => {
      const STORAGE_KEY = 'jpsearch:saitamaMapImageDataUrl:v1';

      const img = document.getElementById('mapImg');
      const fallback = document.getElementById('fallback');
      const fileEl = document.getElementById('mapFile');
      const chooseBtn = document.getElementById('chooseBtn');
      const clearBtn = document.getElementById('clearBtn');
      const statusBadge = document.getElementById('statusBadge');

      if (!(img instanceof HTMLImageElement)) return;
      if (!(fallback instanceof HTMLElement)) return;
      if (!(fileEl instanceof HTMLInputElement)) return;
      if (!(chooseBtn instanceof HTMLButtonElement)) return;
      if (!(clearBtn instanceof HTMLButtonElement)) return;
      if (!(statusBadge instanceof HTMLElement)) return;

      function setStatus(text) {
        statusBadge.textContent = text;
      }

      function showFallback() {
        img.hidden = true;
        fallback.hidden = false;
      }

      function showImage() {
        fallback.hidden = true;
        img.hidden = false;
      }

      function loadSaved() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (!saved) return false;
          img.src = saved;
          showImage();
          clearBtn.disabled = false;
          setStatus('保存画像を表示中');
          return true;
        } catch {
          return false;
        }
      }

      function clearSaved() {
        try {
          localStorage.removeItem(STORAGE_KEY);
        } catch {
          // noop
        }
        clearBtn.disabled = true;
        setStatus('保存画像をクリア');
      }

      // 1) まずは assets/saitama_map.png を試す
      // 2) 失敗したら localStorage の保存画像を試す
      // 3) それも無ければフォールバックを出す
      let pngTried = false;
      img.addEventListener('load', () => {
        pngTried = true;
        showImage();
        setStatus('PNGを表示中');
      }, { once: true });

      img.addEventListener('error', () => {
        // PNG が読めなかった時だけ、保存画像→フォールバックの順で切り替える
        if (pngTried) return;
        pngTried = true;
        const ok = loadSaved();
        if (!ok) {
          clearBtn.disabled = true;
          setStatus('画像なし（概略図）');
          showFallback();
        }
      }, { once: true });

      // 既に保存画像がある場合はボタンを有効化（PNGが成功するならそちらが優先される）
      try {
        clearBtn.disabled = !localStorage.getItem(STORAGE_KEY);
      } catch {
        clearBtn.disabled = true;
      }

      chooseBtn.addEventListener('click', () => {
        fileEl.click();
      });

      clearBtn.addEventListener('click', () => {
        clearSaved();
        // PNGをもう一度試す（置いた直後など）
        try {
          img.hidden = false;
          fallback.hidden = true;
          setStatus('PNGを再読み込み');
          img.src = './saitama_map.png?ts=' + Date.now();
        } catch {
          // noop
        }
      });

      fileEl.addEventListener('change', async () => {
        const f = fileEl.files && fileEl.files[0];
        if (!f) return;
        if (!f.type || !f.type.startsWith('image/')) {
          setStatus('画像ファイルを選んでください');
          return;
        }

        // サイズ過大を避ける（localStorage目安5MB程度）
        if (f.size > 2_500_000) {
          setStatus('画像が大きすぎます（2.5MB以下推奨）');
          return;
        }

        setStatus('読み込み中');
        const reader = new FileReader();
        const dataUrl = await new Promise((resolve, reject) => {
          reader.onload = () => resolve(String(reader.result || ''));
          reader.onerror = () => reject(new Error('read failed'));
          reader.readAsDataURL(f);
        }).catch(() => '');

        if (!dataUrl) {
          setStatus('読み込み失敗');
          return;
        }

        try {
          localStorage.setItem(STORAGE_KEY, dataUrl);
          clearBtn.disabled = false;
        } catch {
          // localStorageが使えない場合でも、その場の表示は行う
        }

        img.src = dataUrl;
        showImage();
        setStatus('保存画像を表示中');
      });
    })();
  </script>
</body>
</html>
