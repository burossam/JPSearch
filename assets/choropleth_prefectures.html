<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>都道府県 色分け地図（jobCount）</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    html, body { height: 100%; margin: 0; }
    .wrap { height: 100%; display: grid; grid-template-rows: auto 1fr; }
    header { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; }
    h1 { font-size: 14px; margin: 0 0 4px; }
    .hint { font-size: 12px; margin: 0; color: #4b5563; line-height: 1.6; }
    #map { height: 100%; }
    .legend { background: white; padding: 8px 10px; border: 1px solid #e5e7eb; border-radius: 10px; font: 12px/1.4 system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans JP", Meiryo, sans-serif; }
    .legend .row { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
    .legend .swatch { width: 14px; height: 14px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.15); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>都道府県 色分け地図（jobCount）</h1>
      <p class="hint">
        入力: <code>/api/prefectures/geojson</code>（API）または <code>assets/generated/prefectures_jobcount.geojson</code>（生成ファイル）
      </p>
    </header>
    <div id="map"></div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    (() => {
      const map = L.map('map', { zoomControl: true });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18,
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      function getColor(jobCount) {
        const x = Number.isFinite(jobCount) ? jobCount : 0;
        // thresholds (simple)
        // NOTE: 既存CSSで使っている色（中立/青系/赤）を再利用して、色の追加を避ける。
        if (x >= 200) return '#111827';
        if (x >= 100) return '#1d4ed8';
        if (x >= 50) return '#0ea5e9';
        if (x >= 10) return '#c7d2fe';
        if (x >= 1) return '#eef2ff';
        return '#f3f4f6';
      }

      function style(feature) {
        const jobCount = feature && feature.properties ? feature.properties.jobCount : 0;
        return {
          fillColor: getColor(jobCount),
          weight: 1,
          opacity: 1,
          color: '#9ca3af',
          fillOpacity: 0.85,
        };
      }

      function onEachFeature(feature, layer) {
        const p = (feature && feature.properties) ? feature.properties : {};
        const name = p.prefectureName ?? p.name ?? '不明';
        const code = p.prefectureCode ?? '';
        const jobCount = p.jobCount ?? 0;
        layer.bindPopup(`${name} (${code})<br/>jobCount: <b>${jobCount}</b>`);
      }

      const legend = L.control({ position: 'bottomright' });
      legend.onAdd = function() {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = '<div><b>jobCount</b></div>'
          + '<div class="row"><span class="swatch" style="background:#111827"></span><span>200+</span></div>'
          + '<div class="row"><span class="swatch" style="background:#1d4ed8"></span><span>100–199</span></div>'
          + '<div class="row"><span class="swatch" style="background:#0ea5e9"></span><span>50–99</span></div>'
          + '<div class="row"><span class="swatch" style="background:#c7d2fe"></span><span>10–49</span></div>'
          + '<div class="row"><span class="swatch" style="background:#eef2ff"></span><span>1–9</span></div>'
          + '<div class="row"><span class="swatch" style="background:#f3f4f6"></span><span>0</span></div>';
        return div;
      };
      legend.addTo(map);

      const sources = [
        '/api/prefectures/geojson',
        './generated/prefectures_jobcount.geojson',
      ];

      const fetchFirst = async () => {
        let lastErr = null;
        for (const url of sources) {
          try {
            const r = await fetch(url, { cache: 'no-store' });
            if (!r.ok) throw new Error(`Failed to load geojson (${url}): ${r.status}`);
            return await r.json();
          } catch (e) {
            lastErr = e;
          }
        }
        throw lastErr ?? new Error('Failed to load geojson');
      };

      fetchFirst()
        .then((r) => {
          const geojson = r;
          const layer = L.geoJSON(geojson, { style, onEachFeature }).addTo(map);
          const bounds = layer.getBounds();
          if (bounds && bounds.isValid()) {
            map.fitBounds(bounds, { padding: [10, 10] });
          } else {
            map.setView([36.2048, 138.2529], 5);
          }
        })
        .catch((err) => {
          console.error(err);
          map.setView([36.2048, 138.2529], 5);
          const msg = L.control({ position: 'topright' });
          msg.onAdd = function() {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<b>GeoJSONがありません</b><br/>'
              + '<div style="margin-top:6px;">先に <code>assets/generated/prefectures_jobcount.geojson</code> を生成してください。</div>';
            return div;
          };
          msg.addTo(map);
        });
    })();
  </script>
</body>
</html>
